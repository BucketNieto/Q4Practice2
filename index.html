<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practce 2</title>
</head>
<body>
    <h1>Switch Statement</h1>

    <button class="btn" onclick="TeamRank()">Rank</button>
    <script>
        let team = "Yellow";

        switch(team){
            case "Yellow":
                alert("Roar roar Tigers!");
                break;
            case "Blue":
                alert("B L U E B E A R S !");
                break;
                case "Red":
                alert("Arf arf bulldogs!");
                break;
            case "Green":
                alert("Bzzt bzzt hornets!");
                break;
                default:
                    alert("Team could not be found!");
        }
    </script>
    
</body>
</html>
